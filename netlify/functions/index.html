<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐾 Cafés Dog-Friendly</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fdf6ec; --brown: #3b1f0e; --amber: #c8763a;
      --green: #4a7c59; --light: #f5ede0; --card-bg: #fffaf4;
    }
    body { background-color: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--brown); min-height: 100vh; }
    header { background-color: var(--brown); color: var(--cream); padding: 2.5rem 1.5rem 2rem; text-align: center; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 0.4rem; }
    header p { font-size: 0.95rem; opacity: 0.75; }
    .search-bar { background: var(--amber); padding: 1.2rem 1.5rem; display: flex; gap: 0.6rem; }
    .search-bar input { flex: 1; padding: 0.7rem 1rem; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; background: var(--cream); color: var(--brown); outline: none; }
    .search-bar button { padding: 0.7rem 1.2rem; background: var(--brown); color: var(--cream); border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .search-bar button:hover { opacity: 0.85; }
    .results { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; max-width: 640px; margin: 0 auto; }
    .results-title { font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: var(--amber); padding: 0.5rem 0; }
    .card { background: var(--card-bg); border-radius: 10px; padding: 1.2rem 1.3rem; border: 1px solid #e8d8c4; box-shadow: 0 2px 8px rgba(59,31,14,0.06); transition: transform 0.15s, box-shadow 0.15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(59,31,14,0.1); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
    .card h2 { font-family: 'Playfair Display', serif; font-size: 1.15rem; }
    .rating { background: var(--green); color: white; font-size: 0.8rem; font-weight: 500; padding: 0.2rem 0.55rem; border-radius: 20px; white-space: nowrap; }
    .card-address { font-size: 0.85rem; color: #7a5c42; margin-bottom: 0.7rem; }
    .open-status { font-size: 0.8rem; color: var(--green); font-weight: 500; margin-bottom: 0.7rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag { background: var(--light); border: 1px solid #dcc9b2; color: var(--brown); font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 20px; }
    .tag.dog { background: #fde8d0; border-color: var(--amber); color: var(--amber); }
    .empty { text-align: center; padding: 3rem 1rem; color: #a07850; font-size: 0.95rem; }
    .empty span { font-size: 2rem; display: block; margin-bottom: 0.8rem; }
    .loading { text-align: center; padding: 2rem; color: var(--amber); font-size: 0.95rem; }
    .error { background: #fff0f0; border-left: 3px solid #e07070; padding: 0.9rem 1.1rem; border-radius: 0 6px 6px 0; font-size: 0.85rem; color: #a05050; }
  </style>
</head>
<body>

<header>
  <h1>🐾 Cafés Dog-Friendly</h1>
  <p>Encuentra un café donde tu perro también sea bienvenido</p>
</header>

<div class="search-bar">
  <input type="text" id="inputCiudad" placeholder="Escribe una ciudad... (ej: Madrid)" />
  <button onclick="buscar()">Buscar</button>
</div>

<div class="results" id="resultados">
  <div class="empty">
    <span>☕</span>
    Escribe una ciudad para ver los cafés
  </div>
</div>

<script>
  async function buscar() {
    const ciudad = document.getElementById('inputCiudad').value.trim();
    const contenedor = document.getElementById('resultados');

    if (!ciudad) {
      contenedor.innerHTML = `<div class="empty"><span>☕</span>Escribe una ciudad para buscar</div>`;
      return;
    }

    // Mostrar loading mientras espera
    contenedor.innerHTML = `<div class="loading">🐾 Buscando cafés en ${ciudad}...</div>`;

    try {
      // Llama a nuestra Netlify Function (el intermediario)
      const respuesta = await fetch(`/.netlify/functions/buscar?ciudad=${encodeURIComponent(ciudad)}`);
      const cafes = await respuesta.json();

      if (!cafes.length) {
        contenedor.innerHTML = `<div class="empty"><span>🐾</span>No encontramos cafés dog-friendly en <strong>${ciudad}</strong>.</div>`;
        return;
      }

      const titulo = `<div class="results-title">${cafes.length} cafés encontrados en ${ciudad}</div>`;

      const tarjetas = cafes.map(cafe => `
        <div class="card">
          <div class="card-header">
            <h2>${cafe.nombre}</h2>
            <span class="rating">${cafe.rating}</span>
          </div>
          <div class="card-address">📍 ${cafe.direccion}</div>
          <div class="open-status">${cafe.abierto}</div>
          <div class="tags">
            <span class="tag dog">🐶 Dog-friendly</span>
          </div>
        </div>
      `).join('');

      contenedor.innerHTML = titulo + tarjetas;

    } catch (error) {
      contenedor.innerHTML = `<div class="error">❌ Hubo un error al buscar. Comprueba que la API está configurada correctamente.</div>`;
    }
  }

  document.getElementById('inputCiudad').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
  });
</script>

</body>
</html>
